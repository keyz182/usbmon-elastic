# ---------------------------------------------------------------------------
# Elastic Agent — custom_logs integration snippet for usbmon metrics
#
# Fleet UI setup:
#   - Datastream type: Metrics
#   - Dataset name:    usbtop.metrics
#   - Log file path:   /var/log/usbtop-metrics/usbtop.ndjson
#   - Parsers (YAML):  see below
#
# If you manage elastic-agent.yml directly, add the block below
# under the `inputs:` section of your agent policy.
# ---------------------------------------------------------------------------

inputs:
  - type: logfile
    id: usbtop-ndjson-metrics
    data_stream:
      type: metrics
      dataset: usbtop.metrics
      namespace: default
    paths:
      - /var/log/usbtop-metrics/usbtop.ndjson
    parsers:
      - ndjson:
          target: ""           # merge all JSON keys into the root document
          add_error_key: true  # surface parse failures as event.error
    # Ensure the agent picks up rotated files
    close_inactive: 5m
    scan_frequency: 10s
    harvester_limit: 1
